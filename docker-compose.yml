services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://frontend:80

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
